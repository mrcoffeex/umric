_format_version: "1.1"
_transform: true

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth_all
        strip_path: true
        paths:
          - /auth/v1

  - name: rest
    url: http://rest:3000
    routes:
      - name: rest_all
        strip_path: false
        paths:
          - /rest/v1

  - name: realtime
    url: http://realtime:4000/socket
    routes:
      - name: realtime_all
        strip_path: true
        paths:
          - /realtime/v1

  - name: storage
    url: http://storage:5000
    routes:
      - name: storage_all
        strip_path: false
        paths:
          - /storage/v1
